# Data contract — Lab Day 10 (tiếp nối artifact CS + IT Helpdesk)
# Sinh viên bổ sung owner, SLA freshness, và nguồn canonical.

version: "1.0"
dataset: "kb_chunk_export"
owner_team: "AI in Action Day 10 lab team"

schema_cleaned:
  chunk_id:
    type: string
    required: true
    description: "ID ổn định sau clean (thường hash hoặc doc_id + seq)"
  doc_id:
    type: string
    required: true
    description: "Khóa logic tài liệu nguồn (vd policy_refund_v4)"
  chunk_text:
    type: string
    required: true
    constraints:
      min_length: 8
  effective_date:
    type: date
    required: true
  exported_at:
    type: datetime
    required: true

quality_rules:
  - id: "no_duplicate_chunk_text"
    severity: "warn"
  - id: "no_stale_refund_window"
    description: "Không được để chunk policy refund chứa cửa sổ 14 ngày (lệch so với v4 = 7 ngày)"
    severity: "halt"
  - id: "required_doc_ids_present"
    description: "Cleaned corpus phải có đủ 5 doc_id canonical dùng cho grading/retrieval."
    severity: "halt"
  - id: "unique_non_empty_chunk_id"
    description: "chunk_id không được rỗng hoặc trùng để Chroma upsert/prune idempotent."
    severity: "halt"
  - id: "exported_at_iso_datetime"
    description: "exported_at phải là ISO datetime để freshness và lineage đọc được."
    severity: "halt"
  - id: "no_parser_noise_markers"
    description: "Không để marker parser như 'Nội dung không rõ ràng' hoặc '!!!' lọt vào retrieval context."
    severity: "halt"
  - id: "sla_p1_no_p2_chunk"
    description: "Corpus sla_p1_2026 không chứa chunk P2 gây nhiễu câu hỏi P1 escalation."
    severity: "halt"

freshness:
  measured_at: "publish"  # ingest | cleaned | publish
  sla_hours: 24
  alert_channel: "#ai-data-quality"

canonical_sources:
  - path: "data/docs/policy_refund_v4.txt"
    doc_id: "policy_refund_v4"
  - path: "data/docs/sla_p1_2026.txt"
    doc_id: "sla_p1_2026"
  - path: "data/docs/it_helpdesk_faq.txt"
    doc_id: "it_helpdesk_faq"
  - path: "data/docs/hr_leave_policy.txt"
    doc_id: "hr_leave_policy"
  - path: "data/docs/access_control_sop.txt"
    doc_id: "access_control_sop"

# Baseline allowlist export — nhóm mở rộng doc mới phải đồng bộ cleaning_rules + contract.
allowed_doc_ids:
  - policy_refund_v4
  - sla_p1_2026
  - it_helpdesk_faq
  - hr_leave_policy
  - access_control_sop

# Merit/Distinction: có thể đưa cutoff versioning vào env và tham chiếu ở đây (tránh hard-code trong code).
policy_versioning:
  policy_refund_min_effective_date: "2026-02-01"
  sla_p1_min_effective_date: "2026-01-15"
  it_helpdesk_min_effective_date: "2026-01-20"
  hr_leave_min_effective_date: "2026-01-01"
  access_control_min_effective_date: "2026-01-01"
